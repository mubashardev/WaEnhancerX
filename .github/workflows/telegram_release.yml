name: Telegram Release Notification

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            release_body:
                description: "Changelog/Body of the fake release"
                required: true
                default: "Test Notification - Testing the bot!"
            release_url:
                description: "URL of the release to link"
                required: true
                default: "https://github.com/mubashardev/WaEnhancerX/releases/latest"

jobs:
    telegram-notify:
        runs-on: ubuntu-latest
        env:
            BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
            CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        steps:
            - name: Post release to Telegram channel
              if: ${{ env.BOT_TOKEN != '' && env.CHANNEL_ID != '' && !github.event.release.prerelease }}
              run: |
                BODY="${{ github.event.release.body || inputs.release_body }}"
                URL="${{ github.event.release.html_url || inputs.release_url }}"
                TAG="${{ github.event.release.tag_name || 'Manual' }}"
                
                # Truncate body to avoid Telegram's 4096 character limit
                CLEAN_BODY=$(printf '%s' "$BODY" | sed '/./,$!d' | cut -c 1-4000)
                MESSAGE="$(printf 'STABLE %s\n\n%s\n\nRelease: %s' "$TAG" "$CLEAN_BODY" "$URL")"

                curl -f -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
                  -d "chat_id=${{ secrets.CHANNEL_ID }}" \
                  --data-urlencode "text=$MESSAGE" \
                  -d "disable_web_page_preview=true"
